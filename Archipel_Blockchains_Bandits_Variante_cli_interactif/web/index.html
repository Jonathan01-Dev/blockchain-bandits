<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archipel Control Room</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <header class="topbar">
      <div>
        <p class="kicker">ARCHIPEL CONTROL ROOM</p>
        <h1>Réseau local souverain</h1>
      </div>
      <div class="top-actions">
        <button id="refreshBtn" class="btn btn-ghost">Actualiser</button>
        <span id="connectionState" class="pill">Connexion…</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel stats">
        <h2>État du nœud</h2>
        <div id="statsGrid" class="stats-grid"></div>
      </section>

      <section class="panel peers">
        <h2>Pairs détectés</h2>
        <div id="peersList" class="list"></div>
      </section>

      <section class="panel actions">
        <h2>Actions réseau</h2>

        <form id="msgForm" class="stack">
          <h3>Message chiffré</h3>
          <input name="peerPrefix" placeholder="Prefix peer" required />
          <input name="text" placeholder="Message" required />
          <button class="btn" type="submit">Envoyer</button>
        </form>

        <form id="shareForm" class="stack">
          <h3>Partager un fichier</h3>
          <input name="filePath" placeholder="/chemin/vers/fichier.bin" required />
          <button class="btn" type="submit">Partager</button>
        </form>

        <form id="pullMultiForm" class="stack">
          <h3>Téléchargement multi-source</h3>
          <input name="fileId" placeholder="file_id" required />
          <input name="parallelism" type="number" min="1" max="8" value="3" />
          <input name="outputPath" placeholder="(optionnel) chemin sortie" />
          <button class="btn" type="submit">Lancer pull-multi</button>
        </form>
      </section>

      <section class="panel trust">
        <h2>Trust Store</h2>
        <div id="trustList" class="list"></div>
        <form id="trustApproveForm" class="inline-form">
          <input name="peerPrefix" placeholder="Prefix peer" required />
          <button class="btn btn-small" type="submit">Approve</button>
        </form>
        <form id="trustRevokeForm" class="inline-form">
          <input name="peerPrefix" placeholder="Prefix peer" required />
          <input name="reason" placeholder="reason" />
          <button class="btn btn-small danger" type="submit">Revoke</button>
        </form>
      </section>

      <section class="panel ai">
        <h2>Assistant IA</h2>
        <form id="askForm" class="stack">
          <input name="question" placeholder="Pose une question à Archipel AI" required />
          <button class="btn" type="submit">Demander</button>
        </form>
      </section>

      <section class="panel logs">
        <h2>Journal d’actions</h2>
        <pre id="logOutput"></pre>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
